<head>
<meta charset="UTF-8">

<title>全能导航系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif}

html {
  --bg:#f8fafc;
  --card:#fff;
  --text:#1e2e33;
  --sub:#64748b;
  --border:#e2e8f0;
  --main:#4c6fff;
}
html.dark {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f1f5f9;
  --sub:#cbd5e1;
  --border:#334155;
  --main:#5d8ff9;
}

body{
  background:var(--bg) !important;
  color:var(--text) !important;
  transition: all 0.25s ease;
}
.wrap{max-width:1100px;margin:0 auto;}

.fixed-header{
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width:1100px;
  background:var(--bg) !important;
  z-index: 999;
  padding-bottom: 10px;
  transition: all 0.25s ease;
}

.header{text-align:center;padding:20px 0 10px;position: relative;}
.logo{font-size:32px;font-weight:800;color:var(--main);margin-bottom:8px}
.contact{font-size:14px;color:var(--sub)}
.mode-btn{position:absolute;top:20px;right:20px;padding:8px 12px;border-radius:999px;border:none;background:var(--card);color:var(--text);cursor:pointer}

.search-box{
  background:var(--card);
  border-radius:16px;
  padding:18px;
  margin:10px 0 0;
}
.search-main{display:flex;gap:12px}
.search-input{flex:1;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);outline:none}
.search-btn{padding:14px 22px;border-radius:12px;background:var(--main);color:#fff;border:none;cursor:pointer}

.container{
  max-width:1100px;
  margin:0 auto;
  padding: 240px 0 80px;
}

.cat{margin-bottom:24px}
.cat-title{font-size:18px;font-weight:600;margin-bottom:12px;padding-left:10px;border-left:4px solid var(--main)}

.link-grid{
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:10px;
}

.link-item{display:flex;align-items:center;gap:10px;padding:14px;background:var(--card);border-radius:12px;text-decoration:none;color:var(--text);box-shadow:none}
.link-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--main);color:#fff;border-radius:8px;font-weight:bold}
.back-btn{position:fixed;top:20px;left:20px;width:40px;height:40px;border-radius:50px;background:var(--main);color:#fff;border:none;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:9999}
.back-btn.show{display:flex}

/* 永久强制显示版权 */
.footer{
  display: block !important;
  visibility: visible !important;
  opacity: 1 !important;
  text-align:center !important;
  margin-top:60px !important;
  color:var(--sub) !important;
  font-size:14px !important;
  padding: 20px 0 !important;
  width: 100% !important;
  position: relative !important;
}

.login-modal,.admin-modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:99999}
.login-box{background:var(--card);padding:40px;border-radius:20px;width:400px;text-align:center}
.login-box input{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:1px solid var(--border)}
.login-box button{padding:14px 30px;margin-top:10px;border-radius:12px;background:var(--main);color:#fff;border:none;width:100%}
.btn-red{background:#ef4444}
.admin-modal{display:none!important}
.admin-modal.show{display:flex!important}
.admin-box{width:90%;max-width:1200px;height:90vh;background:var(--card);border-radius:20px;display:flex;overflow:hidden}
.admin-left{width:220px;background:#1e293b;color:#fff;padding:20px}
.admin-left button{width:100%;padding:14px;background:transparent;color:#fff;border:none;text-align:left;margin-bottom:6px;border-radius:8px;cursor:pointer}
.admin-left button.active{background:#2563eb}
.admin-right{flex:1;padding:30px;overflow-y:auto;background:var(--bg)}
.admin-title{font-size:24px;margin-bottom:20px}
.admin-page{display:none}
.admin-page.show{display:block}
input,select{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text)}
button{padding:12px 16px;border-radius:10px;border:none;background:var(--main);color:#fff;cursor:pointer;margin-right:6px}

.item{background:var(--card);padding:14px;border-radius:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:grab}
.item:active{cursor:grabbing}
.item.dragging{opacity:0.5;background:#e2e8f0}

.color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:10px 0}
.color-item{height:44px;border-radius:8px;cursor:pointer;border:2px solid transparent}
.color-item.active{border-color:#000}
</style>
</head>

// 切换模式
function toggleMode() {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
}

// 记忆主题
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'dark') {
  document.documentElement.classList.add('dark');
}

// 初始化
render();
loadConfig();

// 渲染页面
function render(){
  let html = "";
  data.categories.forEach(cat=>{
    html += `<div class="cat">
               <div class="cat-title">${cat.name}</div>
               <div class="link-grid">`;
    data.sites.filter(s=>s.cid==cat.id).forEach(s=>{
      html += `<a class="link-item" href="${s.url}" target="_blank">
                <div class="link-icon" style="background:${s.color}">${s.icon}</div>
                <span>${s.name}</span>
               </a>`;
    });
    html += `</div></div>`;
  });
  document.getElementById("categoryContainer").innerHTML = html;
}

// 搜索
function doSearch(){
  let key = document.getElementById("kw").value.toLowerCase();
  if(!key){render();loadConfig();document.getElementById("backBtn").classList.remove("show");return}
  let list = data.sites.filter(s=>s.name.toLowerCase().includes(key));
  let html = `<div class="cat"><div class="cat-title">搜索结果</div><div class="link-grid">`;
  list.forEach(s=>{html+=`<a class="link-item" href="${s.url}" target="_blank"><div class="link-icon" style="background:${s.color}">${s.icon}</div>${s.name}</a>`});
  html += "</div></div>";
  document.getElementById("categoryContainer").innerHTML = html;
  document.getElementById("backBtn").classList.add("show");
}

// 返回
function goBack(){
  document.getElementById("kw").value="";
  render();
  loadConfig();
  document.getElementById("backBtn").classList.remove("show");
}

  // 纯文本显示，永久可见
  document.getElementById("copyright").innerText = data.copyright;

}

function goPage(n){

  document.querySelectorAll(".admin-left button").forEach(x=>x.classList.remove("active"));
  document.getElementById(`page${n}`).classList.add("show");
  event.target.classList.add("active");

function loadAll(){
  document.getElementById("title").value = data.title;

// 分类拖拽
let draggedItem = null;
function addCat(){
  let n = document.getElementById("catName").value.trim();
  if(!n)return;
  data.categories.push({id:Date.now(),name:n});
  document.getElementById("catName").value="";
  refreshCat();refreshSelect();
}

function refreshCat(){
  let h="";
  data.categories.forEach((c,i)=>{
    h+=`<div class="item" draggable="true" data-index="${i}">
          <span>${c.name}</span>
          <button class="btn-red" onclick="delCat(${i})">删除</button>
        </div>`;
  });
  document.getElementById("catList").innerHTML = h;
  initDrag();
}

function initDrag(){
  const items = document.querySelectorAll("#catList .item");
  items.forEach(item => {
    item.removeEventListener("dragstart", dragStart);
    item.removeEventListener("dragover", dragOver);
    item.removeEventListener("drop", drop);
    item.removeEventListener("dragend", dragEnd);
    
    item.addEventListener("dragstart", dragStart);
    item.addEventListener("dragover", dragOver);
    item.addEventListener("drop", drop);
    item.addEventListener("dragend", dragEnd);
  });
}

function dragStart(e) {
  draggedItem = this;
  this.classList.add("dragging");
  e.dataTransfer.setData("text/plain", this.dataset.index);
}

function dragOver(e) { e.preventDefault(); }
function drop(e) {
  e.preventDefault();
  const fromIndex = parseInt(e.dataTransfer.getData("text/plain"));
  const toIndex = parseInt(this.dataset.index);
  if (fromIndex !== toIndex) {
    const moved = data.categories.splice(fromIndex, 1)[0];
    data.categories.splice(toIndex, 0, moved);
    refreshCat();render();refreshSelect();
  }
}
function dragEnd() { this.classList.remove("dragging"); }

function delCat(i){
  data.categories.splice(i,1);
  refreshCat();refreshSelect();render();
}

function refreshSelect(){
  let h="";data.categories.forEach(c=>h+=`<option value="${c.id}">${c.name}</option>`);
  document.getElementById("catSelect").innerHTML=h;
}

function makeColor(){
  let h="";
  ["#4c6fff","#22c55e","#0ea5e9","#8b5cf6","#f97316","#ec4899","#ef4444","#10b981","#f59e0b","#84cc16"].forEach(c=>{
    h+=`<div class="color-item" style="background:${c}" onclick="setC('${c}')"></div>`;
  });
  document.getElementById("colorGrid").innerHTML=h;
}
function setC(c){
  document.getElementById("siteColor").value=c;
  document.querySelectorAll(".color-item").forEach(i=>i.classList.remove("active"));
  event.target.classList.add("active");
}

function addSite(){
  let c = document.getElementById("catSelect").value;
  let n = document.getElementById("siteName").value.trim();
  let u = document.getElementById("siteUrl").value.trim();
  let i = document.getElementById("siteIcon").value||"链";
  let co = document.getElementById("siteColor").value||"#4c6fff";
  if(!c||!n||!u)return;
  data.sites.push({cid:Number(c),name:n,url:u,icon:i,color:co});
  document.getElementById("siteName").value="";
  document.getElementById("siteUrl").value="";
  document.getElementById("siteIcon").value="";
  document.getElementById("siteColor").value="";
  alert("添加成功");
  render();refreshAllSite();
}

function refreshAllSite(){
  let h="";data.sites.forEach((s,i)=>{
    let name = data.categories.find(x=>x.id==s.cid)?.name||"未分类";
    h+=`<div class="item"><span>${name} → ${s.name}</span><button class="btn-red" onclick="delSite(${i})">删除</button></div>`;
  });
  document.getElementById("allSiteList").innerHTML=h;
}
function delSite(i){data.sites.splice(i,1);render();refreshAllSite()}

makeColor();
</script>
</body>
</html>
